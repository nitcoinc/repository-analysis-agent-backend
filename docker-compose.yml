# Backend only — PostgreSQL, Neo4j, and Redis are expected at external endpoints
# configured in `.env` (see `.env.example`).

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-codebase-analysis
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    volumes:
      - backend_repositories:/app/repositories
      - backend_uploads:/app/uploads

volumes:
  backend_repositories:
  backend_uploads:
